server {
    listen 8088;
    server_name unit.test;
    root ./site/www;
    index index.html;
    client_max_body_size 1024;
    error_page 404 /error_pages/404.html;

    location / {
        allow_methods GET;
        autoindex off;
    }

    location /upload {
        allow_methods GET POST;
        upload_store ./site/www/upload;
        autoindex on;
    }
}
