name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build server
        run: make
      - name: Run unit tests
        run: make test
      - name: Verify required cleanup target
        run: make fclean
