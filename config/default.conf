server {
    listen 8080;
    server_name localhost1;
    root ./site/www123;
    root ./site/www23;
    root ./site/www3;
    root ./site/www/;
    client_max_body_size 1000000000;
    index test_index1.html index_test_1.htm; 
    error_page 404 403 406 405 413 /error_pages/404.html;
    error_page 500 505 /error_pages/500.html;

    location / {
        allow_methods GET;
        autoindex off;
    }

    location /upload {
        allow_methods GET POST DELETE;
        upload_store ./www/uploads;
		index loc_index.htm;
        autoindex on;
    }

    location /images {
        root ./www/images;
        allow_methods GET;
        autoindex on;
    }

    location /cgi-bin {
        root ./www/cgi-bin;
        allow_methods GET POST;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }

    location /old-page {
        return 301 /;
    }
}

server {
    listen 8081;
    server_name test.localhost;

    root ./www_test;
    index index.html;

    client_max_body_size 500000;

    error_page 404 ./www_test/errors/404.html;

    location / {
        allow_methods GET;
        autoindex off;
    }

    location /api {
        allow_methods GET POST;
        autoindex off;
    }
}
